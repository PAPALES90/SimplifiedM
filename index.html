<!DOCTYPE html>
<html>
<head>
    <title>Sohbet Odası</title>
</head>
<body>
    <h1>Sohbet Sistemi Aktif</h1>
    <div id="chat" style="height:300px; border:1px solid #ccc; overflow:auto;"></div>
    <input id="input"><button onclick="send()">Gönder</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://simplifiedm.onrender.com"); // Kendi linkini buraya yaz
        function send() {
            const val = document.getElementById('input').value;
            socket.emit('mesaj', val);
            document.getElementById('input').value = '';
        }
        socket.on('mesaj', (msg) => {
            const div = document.createElement('div');
            div.textContent = msg;
            document.getElementById('chat').appendChild(div);
        });
    </script>
</body>
</html>
