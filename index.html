<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplifiedM Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Giriş Modalı */
        #login-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: #008069; display:flex; justify-content:center; align-items:center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* Sohbet Ekranı */
        #chat-ui { width: 100%; max-width: 400px; height: 90vh; background: white; display: flex; flex-direction: column; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow: hidden; }
        #header { background: #008069; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat { flex: 1; padding: 15px; overflow-y: auto; background: #f0f2f5; }
        
        /* Baloncuklar */
        .msg { background: white; padding: 10px; margin: 8px 0; border-radius: 10px; width: fit-content; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Giriş Çubuğu */
        .footer { padding: 10px; display: flex; gap: 5px; background: white; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #008069; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="login-box">
            <h2>Hoş geldin!</h2>
            <input id="name-input" placeholder="Adın ne?">
            <br><br>
            <button onclick="kayitOl()">Sohbete Başla</button>
        </div>
    </div>

    <div id="chat-ui" style="display:none;">
        <div id="header">Aktif: <span id="liste">...</span></div>
        <div id="chat"></div>
        <div class="footer">
            <input id="input" placeholder="Mesaj yaz...">
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script>
        var socket = io(); 
        var kullaniciAdi = localStorage.getItem('chatUsername');

        if (kullaniciAdi) { baslat(kullaniciAdi); }

        function kayitOl() {
            var isim = document.getElementById('name-input').value;
            if(isim) {
                localStorage.setItem('chatUsername', isim);
                baslat(isim);
            }
        }

        function baslat(isim) {
            kullaniciAdi = isim;
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            socket.emit('yeni-kullanici', isim);
        }

        function send() {
            var input = document.getElementById('input');
            if(input.value.trim() !== "") {
                socket.emit('mesaj', {kimden: kullaniciAdi, icerik: input.value});
                input.value = '';
            }
        }

        socket.on('mesaj', function(data) {
            var div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = '<strong>' + data.kimden + ':</strong> ' + data.icerik;
            var chat = document.getElementById('chat');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        socket.on('kullanici-listesi', function(list) {
            document.getElementById('liste').textContent = list.join(', ');
        });
    </script>
</body>
</html>
