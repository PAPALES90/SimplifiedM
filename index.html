<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // 1. ADIM: Sunucuya bağlanmaya çalış
    const socket = io("https://channel7.onrender.com"); 

    // 2. ADIM: Bağlantı başarılı mı diye kontrol et (F12 Konsoluna yazacak)
    socket.on("connect", () => {
        console.log("Sunucuya bağlandım! ID: " + socket.id);
    });

    // 3. ADIM: Mesaj gönderme
    function send() {
        const input = document.getElementById("msg");
        if(input.value.trim() !== "") {
            socket.emit("mesaj", input.value); 
            input.value = "";
        }
    }

    // 4. ADIM: Mesajı ekrana yazma
    socket.on("mesaj", (m) => {
        const chatBox = document.getElementById("chat");
        const div = document.createElement("div");
        div.textContent = m;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
