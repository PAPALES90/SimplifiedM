<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sohbet Odası</title>
</head>
<body>
    <h1>Sohbet Sistemi</h1>
    <div id="chat" style="height:300px; border:1px solid #ccc; overflow:auto; margin-bottom: 10px;"></div>
    
    <input id="input" placeholder="Mesaj yaz...">
    <button onclick="send()">Gönder</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // Eksiksiz bağlantı:
        const socket = io("https://simplifiedm.onrender.com");

        socket.on('connect', () => {
            console.log("Sunucuya bağlandım!");
        });

        let kullaniciAdi = prompt("İsmin ne? (Max 13 harf):") || "Misafir";
        if (kullaniciAdi.length > 13) kullaniciAdi = kullaniciAdi.substring(0, 13);

        function send() {
            const input = document.getElementById('input');
            const msg = input.value;
            
            console.log("Gönder butonuna basıldı. Mesaj:", msg); // Bak burası F12'de gözükecek

            if (msg.trim() !== "") {
                const formatliMesaj = `(${kullaniciAdi}): ${msg}`;
                socket.emit('mesaj', formatliMesaj);
                console.log("Mesaj sunucuya gönderildi."); // Başarılıysa bu çıkacak
                input.value = '';
            }
        }

        socket.on('mesaj', (msg) => {
            console.log("Sunucudan yeni mesaj geldi:", msg); // Yeni mesaj gelince burası çalışacak
            const div = document.createElement('div');
            div.textContent = msg;
            const chatBox = document.getElementById('chat');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
